name: Update Cask

on:
  repository_dispatch:
    types: [update-cask]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update cask
        run: |
          VERSION="${{ github.event.client_payload.version }}"
          SHA_ARM="${{ github.event.client_payload.sha256_arm64 }}"
          SHA_X86="${{ github.event.client_payload.sha256_x86_64 }}"

          cat > Casks/llama-panel.rb << 'RUBY'
          cask "llama-panel" do
            version "VERSION_PLACEHOLDER"

            on_arm do
              url "https://github.com/AlexsJones/llama-panel/releases/download/v#{version}/llama-panel-v#{version}-macos-aarch64.tar.gz"
              sha256 "SHA_ARM_PLACEHOLDER"
            end

            on_intel do
              url "https://github.com/AlexsJones/llama-panel/releases/download/v#{version}/llama-panel-v#{version}-macos-x86_64.tar.gz"
              sha256 "SHA_X86_PLACEHOLDER"
            end

            name "llama-panel"
            desc "Native macOS desktop app for managing llama-server instances"
            homepage "https://github.com/AlexsJones/llama-panel"

            app "llama-panel.app"
            binary "#{appdir}/llama-panel.app/Contents/MacOS/llama-panel", target: "llama-panel"

            zap trash: [
              "~/Library/Caches/com.llamapanel.app",
              "~/Library/Preferences/com.llamapanel.app.plist",
              "~/Library/Saved Application State/com.llamapanel.app.savedState",
            ]
          end
          RUBY

          sed -i "s/VERSION_PLACEHOLDER/$VERSION/g" Casks/llama-panel.rb
          sed -i "s/SHA_ARM_PLACEHOLDER/$SHA_ARM/g" Casks/llama-panel.rb
          sed -i "s/SHA_X86_PLACEHOLDER/$SHA_X86/g" Casks/llama-panel.rb

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/llama-panel.rb
          git commit -m "Update llama-panel to ${{ github.event.client_payload.version }}"
          git push
